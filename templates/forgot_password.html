<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password — IMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        html,body{height:100%;overflow:auto;background:#f1f5f9;}
        .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .auth-card{background:#fff;border-radius:14px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.10);}
        .auth-logo{text-align:center;margin-bottom:24px;}
        .auth-logo h1{font-size:1.6rem;font-weight:700;color:#1e293b;margin-bottom:4px;}
        .auth-logo p{font-size:0.875rem;color:#6b7280;}
        .auth-title{font-size:1.1rem;font-weight:600;color:#111827;margin-bottom:8px;text-align:center;}
        .auth-subtitle{font-size:0.875rem;color:#6b7280;text-align:center;margin-bottom:24px;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:5px;}
        .form-group input{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:0.9rem;box-sizing:border-box;}
        .form-group input:focus{outline:none;border-color:#1e293b;}
        .btn-auth{width:100%;padding:12px;background:#1e293b;color:#fff;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;}
        .btn-auth:hover{background:#0f172a;}
        .btn-auth:disabled{opacity:0.6;cursor:not-allowed;}
        .auth-msg{padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:14px;display:none;}
        .auth-error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;}
        .auth-success{background:#f0fdf4;border:1px solid #86efac;color:#16a34a;}
        .auth-links{text-align:center;margin-top:18px;font-size:0.875rem;}
        .auth-links a{color:#1e293b;text-decoration:none;font-weight:500;}
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo"><h1>📦 IMS</h1><p>Inventory Management System</p></div>
        <div class="auth-title">Reset your password</div>
        <div class="auth-subtitle">Enter your email and we'll generate a reset link.</div>

        <div class="auth-msg auth-error"   id="errorMsg"></div>
        <div class="auth-msg auth-success" id="successMsg"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        <button class="btn-auth" id="submitBtn" onclick="doForgot()">Send Reset Link</button>
        <div class="auth-links"><a href="/login">← Back to login</a></div>
    </div>
</div>
<script>
    async function doForgot() {
        var email = document.getElementById('email').value.trim();
        var btn   = document.getElementById('submitBtn');
        document.getElementById('errorMsg').style.display   = 'none';
        document.getElementById('successMsg').style.display = 'none';
        if (!email) { showMsg('errorMsg', 'Please enter your email address.'); return; }
        btn.disabled = true; btn.textContent = 'Sending...';
        try {
            var res  = await fetch('/api/auth/forgot-password', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ email })
            });
            var data = await res.json();
            showMsg('successMsg', data.message || 'Check your console for the reset link (dev mode).');
        } catch(e) { showMsg('errorMsg', 'Network error. Please try again.'); }
        finally { btn.disabled = false; btn.textContent = 'Send Reset Link'; }
    }
    function showMsg(id, msg) {
        var el = document.getElementById(id);
        el.textContent = msg; el.style.display = 'block';
    }
</script>
</body>
</html>
