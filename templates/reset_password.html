<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password — IMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        html,body{height:100%;overflow:auto;background:#f1f5f9;}
        .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .auth-card{background:#fff;border-radius:14px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.10);}
        .auth-logo{text-align:center;margin-bottom:24px;}
        .auth-logo h1{font-size:1.6rem;font-weight:700;color:#1e293b;margin-bottom:4px;}
        .auth-logo p{font-size:0.875rem;color:#6b7280;}
        .auth-title{font-size:1.1rem;font-weight:600;color:#111827;margin-bottom:20px;text-align:center;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:5px;}
        .form-group input{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:0.9rem;box-sizing:border-box;}
        .form-group input:focus{outline:none;border-color:#1e293b;}
        .btn-auth{width:100%;padding:12px;background:#1e293b;color:#fff;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;}
        .btn-auth:hover{background:#0f172a;}
        .btn-auth:disabled{opacity:0.6;cursor:not-allowed;}
        .auth-msg{padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:14px;display:none;}
        .auth-error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;}
        .auth-success{background:#f0fdf4;border:1px solid #86efac;color:#16a34a;}
        .password-rules{font-size:11px;color:#9ca3af;margin-top:4px;line-height:1.6;}
        .auth-links{text-align:center;margin-top:18px;font-size:0.875rem;}
        .auth-links a{color:#1e293b;text-decoration:none;font-weight:500;}
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo"><h1>📦 IMS</h1><p>Inventory Management System</p></div>
        <div class="auth-title">Set a new password</div>

        <div class="auth-msg auth-error"   id="errorMsg"></div>
        <div class="auth-msg auth-success" id="successMsg"></div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="password" placeholder="Create a strong password">
            <div class="password-rules">8+ chars, uppercase, lowercase, number, special character.</div>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat new password">
        </div>
        <button class="btn-auth" id="submitBtn" onclick="doReset()">Reset Password</button>
        <div class="auth-links"><a href="/login">← Back to login</a></div>
    </div>
</div>
<script>
    var resetToken = '{{ token }}';

    async function doReset() {
        var password = document.getElementById('password').value;
        var confirm  = document.getElementById('confirmPassword').value;
        var btn      = document.getElementById('submitBtn');
        hideMsg();
        if (!password || !confirm) { showMsg('errorMsg','All fields required.'); return; }
        if (password !== confirm)  { showMsg('errorMsg','Passwords do not match.'); return; }
        if (!resetToken)           { showMsg('errorMsg','Invalid reset link.'); return; }
        btn.disabled = true; btn.textContent = 'Resetting...';
        try {
            var res  = await fetch('/api/auth/reset-password', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ token: resetToken, password })
            });
            var data = await res.json();
            if (res.ok) {
                showMsg('successMsg', data.message + ' Redirecting...');
                setTimeout(function(){ window.location.href = '/login'; }, 2000);
            } else {
                showMsg('errorMsg', data.error || 'Reset failed.');
            }
        } catch(e) { showMsg('errorMsg','Network error.'); }
        finally { btn.disabled = false; btn.textContent = 'Reset Password'; }
    }
    function showMsg(id,msg){ var e=document.getElementById(id); e.textContent=msg; e.style.display='block'; }
    function hideMsg(){ document.getElementById('errorMsg').style.display='none'; document.getElementById('successMsg').style.display='none'; }
</script>
</body>
</html>
